<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline — Project Ledger</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F5F8FC;
    --paper-raised:#FFFFFF;
    --ink:#0A0E17;
    --ink-soft:#5B6472;
    --line:#DCE3EE;
    --line-soft:#EAEFF6;
    --blue:#033ABC;
    --blue-dark:#022B8C;
    --blue-soft:#E7ECFA;
    --teal:#0DC1CF;
    --teal-dark:#0A96A1;
    --teal-soft:#E1F8FA;
    --red:#C1443D;
    --red-soft:#FBE9E7;
    --amber:#B9790A;
    --amber-soft:#FCF0DA;
    --slate-soft:#EEF1F5;
    --radius:8px;
    --shadow:0 1px 2px rgba(3,58,188,0.06), 0 4px 14px rgba(3,58,188,0.08);
    --gradient-brand:linear-gradient(135deg, var(--blue) 0%, var(--teal) 100%);
    --font-main:'Space Grotesk', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--font-main);
    background:var(--paper);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--blue); color:#fff;}
  button{font-family:inherit;}
  input,select,textarea{font-family:inherit; font-size:14px;}
  a{color:inherit;}

  /* ---------- Login ---------- */
  #loginScreen{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 15% 15%, rgba(3,58,188,0.07), transparent 40%),
      radial-gradient(circle at 85% 85%, rgba(13,193,207,0.08), transparent 40%),
      var(--paper);
    padding:20px;
  }
  .login-card{
    background:var(--paper-raised); border:1px solid var(--line); border-radius:12px;
    padding:40px 36px; width:100%; max-width:380px; box-shadow:var(--shadow);
  }
  .login-mark-img{ height:34px; width:auto; display:block; margin:0 auto 14px; }
  .login-title-img{ height:46px; width:auto; display:block; margin:0 auto 26px; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft); margin-bottom:6px;}
  .field input, .field select, .field textarea{
    width:100%; padding:10px 12px; border:1px solid var(--line); border-radius:6px;
    background:#fff; color:var(--ink); outline:none; transition:border-color .15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus{ border-color:var(--blue); }
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:10px 18px; border-radius:6px; border:1px solid transparent; font-size:14px; font-weight:600;
    cursor:pointer; transition:transform .1s ease, box-shadow .15s ease, background .15s ease;
  }
  .btn:active{ transform:translateY(1px); }
  .btn-primary{ background:var(--blue); color:#fff; }
  .btn-primary:hover{ background:var(--blue-dark); }
  .btn-ghost{ background:transparent; border-color:var(--line); color:var(--ink); }
  .btn-ghost:hover{ background:var(--slate-soft); }
  .btn-danger{ background:transparent; border-color:var(--red); color:var(--red); }
  .btn-danger:hover{ background:var(--red-soft); }
  .btn-block{ width:100%; }
  .login-error{ color:var(--red); font-size:13px; margin-top:12px; display:none; }

  /* ---------- App shell ---------- */
  #app{ display:none; min-height:100vh; flex-direction:column; }
  header.topbar{
    display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; row-gap:8px;
    padding:14px 24px; background:var(--paper-raised); border-bottom:1px solid var(--line);
    position:sticky; top:0; z-index:20;
  }
  .brand{ display:flex; align-items:center; gap:10px; min-width:0; }
  .brand-symbol{ height:28px; width:auto; display:block; flex-shrink:0; }
  .brand-wordmark{ height:20px; width:auto; display:block; flex-shrink:1; max-width:100%; }
  .user-chip{ display:flex; align-items:center; gap:10px; font-size:13px; color:var(--ink-soft); flex-wrap:wrap; }
  .user-chip .name{ color:var(--ink); font-weight:600; }
  .icon-btn{ background:none; border:1px solid var(--line); border-radius:6px; padding:6px 10px; cursor:pointer; color:var(--ink-soft); font-size:13px; }
  .icon-btn:hover{ background:var(--slate-soft); }

  /* ---------- Dashboard strip ---------- */
  .dash-strip{
    display:flex; overflow-x:auto; background:var(--gradient-brand); color:#fff;
  }
  .dash-tile{
    flex:1 1 0; min-width:140px; padding:16px 20px; border-right:1px solid rgba(255,255,255,0.18);
  }
  .dash-tile:last-child{ border-right:none; }
  .dash-num{ font-family:var(--font-main); font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; }
  .dash-num.warn{ color:#FFE9B8; }
  .dash-num.bad{ color:#FFD3CF; }
  .dash-label{ font-size:11px; text-transform:uppercase; letter-spacing:0.07em; color:rgba(255,255,255,0.75); margin-top:4px; }

  /* ---------- Toolbar ---------- */
  .toolbar{
    display:flex; flex-wrap:wrap; align-items:center; gap:10px;
    padding:14px 24px; background:var(--paper-raised); border-bottom:1px solid var(--line);
    position:sticky; top:57px; z-index:15;
  }
  .view-toggle{ display:flex; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .view-toggle button{
    background:#fff; border:none; padding:8px 14px; font-size:13px; font-weight:600; color:var(--ink-soft); cursor:pointer;
  }
  .view-toggle button.active{ background:var(--ink); color:#fff; }
  .spacer{ flex:1; }
  .search-box{ position:relative; min-width:200px; }
  .search-box input{ padding:8px 12px 8px 30px; border:1px solid var(--line); border-radius:6px; width:100%; }
  .search-box::before{ content:"⌕"; position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--ink-soft); }
  select.filter-select{ padding:8px 10px; border:1px solid var(--line); border-radius:6px; background:#fff; color:var(--ink); }
  .chips{ display:flex; gap:6px; flex-wrap:wrap; }
  .chip{
    display:flex; align-items:center; gap:6px; background:var(--slate-soft); border:1px solid var(--line);
    border-radius:20px; padding:4px 10px; font-size:12px; color:var(--ink-soft);
  }
  .chip button{ background:none; border:none; cursor:pointer; color:var(--ink-soft); font-size:13px; line-height:1; padding:0; }

  /* ---------- Board view ---------- */
  #boardView{ display:flex; gap:10px; overflow-x:hidden; padding:16px 16px 32px; align-items:flex-start; }
  .stage-col{
    flex:1 1 0; min-width:0; background:var(--slate-soft); border-radius:10px; border:1px solid var(--line-soft);
    display:flex; flex-direction:column; max-height:calc(100vh - 220px);
  }
  .stage-head{ padding:10px 10px 8px; border-bottom:1px solid var(--line); }
  .stage-name{ font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.03em; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .stage-meta{ font-family:var(--font-main); font-size:10px; color:var(--ink-soft); margin-top:4px; display:flex; flex-direction:column; gap:2px; }
  .stage-body{ padding:8px; overflow-y:auto; flex:1; min-height:60px; }
  .stage-body.drag-over{ background:var(--teal-soft); }
  .card{
    background:#fff; border:1px solid var(--line); border-radius:8px; padding:10px 10px 10px 12px;
    margin-bottom:10px; box-shadow:var(--shadow); cursor:grab; position:relative; border-left:4px solid var(--line);
    transition:transform .1s ease; min-width:0;
  }
  .card:hover{ transform:translateY(-1px); }
  .card.priority-High{ border-left-color:var(--red); }
  .card.priority-Medium{ border-left-color:var(--amber); }
  .card.priority-Low{ border-left-color:var(--teal); }
  .card-title{ font-weight:600; font-size:13.5px; margin-bottom:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .card-id{ font-family:var(--font-main); font-size:10.5px; color:var(--ink-soft); letter-spacing:0.02em; margin-bottom:4px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .card-client{ font-size:12px; color:var(--ink-soft); margin-bottom:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .card-row{ display:flex; justify-content:space-between; align-items:center; font-size:12px; }
  .card-value{ font-family:var(--font-main); font-weight:600; color:var(--ink); }
  .card-owner{ color:var(--ink-soft); }
  .card-flags{ display:flex; gap:6px; margin-top:8px; }
  .flag{ font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; text-transform:uppercase; letter-spacing:0.03em; }
  .flag-overdue{ background:var(--red-soft); color:var(--red); }
  .flag-soon{ background:var(--amber-soft); color:var(--amber); }
  .flag-stale{ background:var(--slate-soft); color:var(--ink-soft); border:1px solid var(--line); }
  .empty-col{ font-size:12px; color:var(--ink-soft); text-align:center; padding:20px 8px; }

  /* ---------- List view ---------- */
  #listView{ padding:20px 24px 40px; overflow-x:auto; }
  table.pipeline-table{ width:100%; border-collapse:collapse; background:var(--paper-raised); border:1px solid var(--line); border-radius:8px; overflow:hidden; }
  table.pipeline-table th{
    text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink-soft);
    padding:10px 12px; border-bottom:1px solid var(--line); background:var(--slate-soft); cursor:pointer; white-space:nowrap;
  }
  table.pipeline-table th.sorted::after{ content:" ▾"; color:var(--blue); }
  table.pipeline-table td{ padding:10px 12px; border-bottom:1px solid var(--line-soft); font-size:13px; vertical-align:middle; }
  table.pipeline-table tr{ border-left:4px solid var(--line); }
  table.pipeline-table tr.priority-High{ border-left-color:var(--red); }
  table.pipeline-table tr.priority-Medium{ border-left-color:var(--amber); }
  table.pipeline-table tr.priority-Low{ border-left-color:var(--teal); }
  table.pipeline-table tbody tr:hover{ background:var(--teal-soft); cursor:pointer; }
  .mono{ font-family:var(--font-main); font-variant-numeric:tabular-nums; }
  .stage-pill{ font-size:11px; padding:3px 8px; border-radius:12px; background:var(--slate-soft); border:1px solid var(--line); color:var(--ink-soft); white-space:nowrap; }
  .status-pill{ font-size:11px; padding:3px 8px; border-radius:12px; font-weight:600; white-space:nowrap; }
  .status-Open{ background:var(--teal-soft); color:var(--teal); }
  .status-Pipeline{ background:var(--blue-soft); color:var(--blue); }
  .status-InProgress{ background:var(--amber-soft); color:var(--amber); }
  .status-Delivered{ background:var(--ink); color:#fff; }
  .status-Lost{ background:var(--red-soft); color:var(--red); }

  /* ---------- Floating add button (mobile) ---------- */
  .fab{
    display:none; position:fixed; bottom:22px; right:22px; z-index:30;
    width:56px; height:56px; border-radius:50%; background:var(--blue); color:#fff; border:none;
    font-size:26px; box-shadow:0 6px 18px rgba(184,134,60,0.4); cursor:pointer; align-items:center; justify-content:center;
  }

  /* ---------- Modal ---------- */
  .modal-backdrop{
    display:none; position:fixed; inset:0; background:rgba(20,33,61,0.45); z-index:50;
    align-items:flex-start; justify-content:center; padding:40px 16px; overflow-y:auto;
  }
  .modal{
    background:#fff; border-radius:12px; width:100%; max-width:640px; box-shadow:var(--shadow);
    animation:modalIn .18s ease;
  }
  @keyframes modalIn{ from{ opacity:0; transform:translateY(8px);} to{opacity:1; transform:translateY(0);} }
  .modal-head{ display:flex; justify-content:space-between; align-items:center; padding:18px 22px; border-bottom:1px solid var(--line); }
  .modal-head h2{ font-family:var(--font-main); font-size:20px; margin:0; font-weight:700; }
  .modal-close{ background:none; border:none; font-size:20px; cursor:pointer; color:var(--ink-soft); }
  .modal-body{ padding:20px 22px; max-height:70vh; overflow-y:auto; }
  .modal-foot{ display:flex; justify-content:space-between; gap:10px; padding:16px 22px; border-top:1px solid var(--line); }
  .grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .tabs{ display:flex; gap:4px; border-bottom:1px solid var(--line); margin-bottom:16px; }
  .tab-btn{ background:none; border:none; padding:8px 4px; margin-right:16px; font-size:13px; font-weight:600; color:var(--ink-soft); cursor:pointer; border-bottom:2px solid transparent; }
  .tab-btn.active{ color:var(--ink); border-bottom-color:var(--blue); }
  .tab-pane{ display:none; }
  .tab-pane.active{ display:block; }
  .activity-entry{ padding:10px 0; border-bottom:1px solid var(--line-soft); font-size:13px; }
  .activity-entry:last-child{ border-bottom:none; }
  .activity-date{ font-family:var(--font-main); font-size:11px; color:var(--ink-soft); }
  .activity-note{ margin-top:2px; }
  .weighted-preview{ background:var(--teal-soft); border-radius:6px; padding:10px 12px; font-size:13px; color:var(--teal); font-weight:600; margin-top:6px; }

  #toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); z-index:80;
    background:var(--ink); color:#fff; padding:10px 20px; border-radius:8px; font-size:13px; opacity:0; transition:all .25s ease; pointer-events:none;
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ---------- Loading overlay ---------- */
  .loading-overlay{
    display:none; position:fixed; inset:0; z-index:200; background:rgba(245,248,252,0.6);
    backdrop-filter:blur(1px); align-items:center; justify-content:center;
  }
  .loading-overlay.show{ display:flex; }
  .spinner{
    width:38px; height:38px; border-radius:50%;
    border:4px solid var(--line); border-top-color:var(--blue);
    animation:spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* ---------- Responsive ---------- */
  @media (max-width: 880px){
    .toolbar{ position:static; }
    #boardView{ display:none !important; }
    #listView{ display:block !important; }
    .view-toggle{ display:none; }
    .fab{ display:flex; }
    table.pipeline-table thead{ display:none; }
    table.pipeline-table, table.pipeline-table tbody, table.pipeline-table tr, table.pipeline-table td{ display:block; width:100%; }
    table.pipeline-table tr{ margin-bottom:10px; border:1px solid var(--line); border-left:4px solid var(--line); border-radius:8px; padding:6px 4px; }
    table.pipeline-table td{ border:none; padding:4px 12px; }
    table.pipeline-table td::before{ content:attr(data-label); display:inline-block; width:110px; font-size:11px; color:var(--ink-soft); text-transform:uppercase; }
    .dash-strip{ flex-wrap:wrap; }
    .dash-tile{ flex:1 1 45%; min-width:0; }
  }

  @media (max-width: 560px){
    header.topbar{ padding:10px 14px; gap:6px; }
    .brand-symbol{ height:22px; }
    .brand-wordmark{ height:15px; }
    .user-chip{ font-size:12px; gap:6px; width:100%; justify-content:flex-end; }
    .signed-in-label{ display:none; }
    .user-chip .name{ display:inline-block; max-width:110px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; vertical-align:middle; margin-right:auto; }
    .icon-btn{ padding:6px 8px; font-size:12px; }
  }
</style>
</head>

    </div>

      <input type="text" id="searchInput" placeholder="Search project, client, notes…" oninput="debouncedRefresh()">
    </div>

    <select class="filter-select" id="filterStage" onchange="refreshProjects()"><option value="">All stages</option></select>
    <select class="filter-select" id="filterStatus" onchange="refreshProjects()">

      <option value="">All priorities</option><option>High</option><option>Medium</option><option>Low</option>
    </select>

      <input type="checkbox" id="filterAwaitingDelivery" onchange="refreshProjects()"> Won — awaiting delivery
    </label>

<!-- ================= PROJECT MODAL ================= -->
<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle">New project</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="tabs">
        <button class="tab-btn active" data-tab="details" onclick="switchTab('details')">Details</button>
        <button class="tab-btn" data-tab="activity" onclick="switchTab('activity')" id="activityTabBtn" style="display:none;">Activity log</button>
      </div>

      <div class="tab-pane active" id="tab-details">
        <div class="field" id="projectIdField" style="display:none;">
          <label>Project ID</label>
          <input id="f_projectId" disabled title="Auto-generated — cannot be edited">
        </div>
        <div class="grid-2">
          <div class="field"><label>Project name *</label><input id="f_projectName"></div>
          <div class="field"><label>Client name *</label><input id="f_clientName"></div>
          <div class="field"><label>Contact person</label><input id="f_contactPerson"></div>
          <div class="field">
            <label>Owner *</label>
            <select id="f_owner"></select>
          </div>
          <div class="field"><label>Contact email</label><input id="f_contactEmail" type="email"></div>
          <div class="field"><label>Contact phone</label><input id="f_contactPhone"></div>
          <div class="field">
            <label>Stage *</label>
            <select id="f_stage" onchange="onStageChange()">
              <option>Lead / Identified</option><option>Qualifying</option><option>Proposal Sent</option>
              <option>Negotiation</option><option>Won</option><option>Lost</option>
            </select>
          </div>
          <div class="field">
            <label>Status</label>
            <select id="f_status" onchange="onStatusChange()">
              <option>Open</option>
            </select>
          </div>
          <div class="field"><label>Deal value *</label><input id="f_dealValue" type="number" min="0" oninput="updateWeightedPreview()"></div>
          <div class="field"><label>Probability (%)</label><input id="f_probability" type="number" min="0" max="100" disabled title="Auto-set from stage — not editable"></div>
          <div class="field">
            <label>Source</label>
            <select id="f_source">
              <option value="">—</option><option>Referral</option><option>Inbound</option><option>Outbound/Cold</option>
              <option>Event</option><option>Partner</option><option>Existing Client</option>
            </select>
          </div>
          <div class="field">
            <label>Engagement type</label>
            <select id="f_engagementType">
              <option value="">—</option>
              <option>Data &amp; Intelligence</option>
              <option>Automation &amp; Operations</option>
              <option>Digital Experiences</option>
              <option>AI &amp; Microsoft Innovation</option>
            </select>
          </div>
          <div class="field">
            <label>Priority</label>
            <select id="f_priority"><option>Medium</option><option>High</option><option>Low</option></select>
          </div>
          <div class="field"><label>Expected close date *</label><input id="f_expectedCloseDate" type="date"></div>
          <div class="field"><label>Next action</label><input id="f_nextAction" disabled title="Auto-set from stage — not editable"></div>
          <div class="field"><label>Next action date</label><input id="f_nextActionDate" type="date"></div>
        </div>

        <div class="field" id="lostReasonField" style="display:none;">
          <label>Lost reason</label><input id="f_lostReason">
        </div>
        <div class="grid-2" id="deliveredFields" style="display:none;">
          <div class="field"><label>Delivery date</label><input id="f_deliveryDate" type="date"></div>
          <div class="field" style="display:flex; align-items:flex-end;">
            <label style="display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink); font-weight:400; text-transform:none;">
              <input type="checkbox" id="f_caseStudyCandidate"> Case study candidate
            </label>
          </div>
        </div>

        <div class="field">
          <label>Tags (comma separated)</label>
          <input id="f_tags" placeholder="e.g. Fintech, Enterprise, Renewal" title="Separate multiple tags with commas, e.g. Fintech, Enterprise, Renewal">
        </div>

        <button class="btn btn-primary" onclick="saveCurrentProject()">Save project</button>

</div>

        </table>

<div id="toast"></div>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
</div>

<script>
/* ============================================================
   CONFIG / STATE
   ============================================================ */
// Set this once to your deployed Apps Script Web App /exec URL.
// This is a backend/deployment setting, not something end users configure.
const API_URL = 'https://script.google.com/macros/s/AKfycby6mc23YGetPly1DDdLkOa4jTdr6pwWy_SUSvQfSlPIcQZ099J3GO-wORwWXVQXn0WLHA/exec';

let TOKEN = sessionStorage.getItem('pipeline_token') || '';
let CURRENT_USER = sessionStorage.getItem('pipeline_user') || '';
let CURRENT_USERNAME = sessionStorage.getItem('pipeline_username') || '';
let CURRENT_ROLE = sessionStorage.getItem('pipeline_role') || '';
let allProjects = [];
let currentView = 'board';
let currentProjectId = null; // null = creating new
let sortState = { by: 'updatedAt', dir: 'desc' };
let searchDebounce = null;
const ADMIN_ROLES = ['Admin', 'BD Head'];

const STAGES = ["Lead / Identified","Qualifying","Proposal Sent","Negotiation","Won","Lost"];
const STAGE_DEFAULT_PROBABILITY = {
  "Lead / Identified":10, "Qualifying":30, "Proposal Sent":55, "Negotiation":75, "Won":100, "Lost":0
};

/* ============================================================
   LOADING OVERLAY — shown automatically while any api() call is in flight
   ============================================================ */
let pendingRequests = 0;
function showLoading(){
  pendingRequests++;
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading(){
  pendingRequests = Math.max(0, pendingRequests - 1);
  if (pendingRequests === 0) document.getElementById('loadingOverlay').classList.remove('show');
}

/* ============================================================
   API HELPER — text/plain avoids a CORS preflight against Apps Script
   ============================================================ */
async function api(action, payload) {
  if (!API_URL || API_URL.indexOf('PASTE_YOUR_DEPLOYMENT_ID_HERE') !== -1) {
    throw new Error('This app is not connected to a backend yet. Ask your administrator to set API_URL in the code.');
  }
  showLoading();
  try {
    const body = Object.assign({ action, token: TOKEN }, payload || {});
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success === false && (data.forceLogout || data.message === 'Token Expired')) {
      sessionStorage.clear();
      showLogin();
      const errEl = document.getElementById('loginError');
      errEl.textContent = data.message || 'Session expired, please sign in again.';
      errEl.style.display = 'block';
      throw new Error(data.message || 'Session expired, please sign in again.');
    }
    return data;
  } finally {
    hideLoading();
  }
}

/* ============================================================
   AUTH
   ============================================================ */
async function doLogin(){
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  errEl.style.display = 'none';
  if (!username || !password) { errEl.textContent = 'Enter username and password.'; errEl.style.display='block'; return; }
  try {
    const data = await api('login', { username, password });
    if (!data.success) { errEl.textContent = data.message || 'Login failed'; errEl.style.display='block'; return; }
    TOKEN = data.token;
    CURRENT_USER = data.user.fullname || data.user.username;
    CURRENT_USERNAME = data.user.username;
    CURRENT_ROLE = data.user.role || '';
    sessionStorage.setItem('pipeline_token', TOKEN);
    sessionStorage.setItem('pipeline_user', CURRENT_USER);
    sessionStorage.setItem('pipeline_username', CURRENT_USERNAME);
    sessionStorage.setItem('pipeline_role', CURRENT_ROLE);
    showApp();
  } catch(e){
    errEl.textContent = e.message; errEl.style.display='block';
  }
}

async function doLogout(){
  try { await api('logout', {}); } catch(e){}
  sessionStorage.clear();
  showLogin();
}

function showLogin(){
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function showApp(){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('currentUserName').textContent = CURRENT_USER;
  document.getElementById('adminTabBtn').style.display = ADMIN_ROLES.indexOf(CURRENT_ROLE) !== -1 ? 'inline-flex' : 'none';
  bootstrap();
}

/* ============================================================
   BOOTSTRAP
   ============================================================ */
async function bootstrap(){
  await loadUserDirectory();
  await refreshDashboard();
  await refreshProjects();
}

// Maps username -> fullname so the app can always display owners by full
// name while still storing/matching the unique username underneath.
let userDirectory = {};
async function loadUserDirectory(){
  userDirectory = {};
  userDirectory[CURRENT_USERNAME] = CURRENT_USER; // always know our own name
  const isPrivileged = ADMIN_ROLES.indexOf(CURRENT_ROLE) !== -1;
  if (!isPrivileged) return; // listUsers is admin-only; executives only ever see themselves anyway
  try {
    const data = await api('listUsers', {});
    if (data.success) {
      data.users.forEach(u => { userDirectory[u.username] = u.fullname; });
    }
  } catch(e){ /* non-fatal — falls back to showing usernames */ }
}
function ownerDisplay(username){
  return userDirectory[username] || username || '';
}

function debouncedRefresh(){
  clearTimeout(searchDebounce);
  searchDebounce = setTimeout(refreshProjects, 300);
}

/* ============================================================
   DASHBOARD
   ============================================================ */
async function refreshDashboard(){
  try {
    const data = await api('getDashboardStats', { periodDays: 90 });
    if (!data.success) return;
    const s = data.stats;
    document.getElementById('dOpenValue').textContent = money(s.openPipelineValue);
    document.getElementById('dWeighted').textContent = money(s.weightedPipelineValue);
    document.getElementById('dOpenCount').textContent = s.openDealsCount;
    document.getElementById('dOverdue').textContent = s.overdueCount;
    document.getElementById('dWinRate').textContent = Math.round(s.winRate*100) + '%';
    document.getElementById('dWonUndelivered').textContent = s.wonNotYetDeliveredCount;
  } catch(e){ toast(e.message, true); }
}

/* ============================================================
   PROJECT LIST / FILTERS
   ============================================================ */
async function refreshProjects(){
  const filters = {
    owner: document.getElementById('filterOwner').value,
    stage: document.getElementById('filterStage').value,
    status: document.getElementById('filterStatus').value,
    priority: document.getElementById('filterPriority').value,
    search: document.getElementById('searchInput').value,
    wonAwaitingDelivery: document.getElementById('filterAwaitingDelivery').checked
  };
  try {
    const data = await api('listProjects', { filters, sortBy: sortState.by, sortDir: sortState.dir });
    if (!data.success) { toast(data.message, true); return; }
    allProjects = data.projects;
    populateOwnerFilter(allProjects);
    populateStageFilter();
    renderChips(filters);
    render();
  } catch(e){ toast(e.message, true); }
}

function populateOwnerFilter(projects){
  const sel = document.getElementById('filterOwner');
  const current = sel.value;
  const owners = Array.from(new Set(projects.map(p=>p.owner).filter(Boolean))).sort();
  sel.innerHTML = '<option value="">All owners</option>' + owners.map(o=>`<option value="${esc(o)}" ${o===current?'selected':''}>${esc(ownerDisplay(o))}</option>`).join('');
}
function populateStageFilter(){
  const sel = document.getElementById('filterStage');
  if (sel.options.length > 1) return;
  sel.innerHTML = '<option value="">All stages</option>' + STAGES.map(s=>`<option>${s}</option>`).join('');
}

function renderChips(filters){
  const row = document.getElementById('chipsRow');
  const chips = [];
  Object.entries(filters).forEach(([k,v])=>{
    if (!v) return;
    const displayVal = k === 'owner' ? ownerDisplay(v) : v;
    chips.push(`<div class="chip">${labelFor(k)}: ${esc(String(displayVal))} <button onclick="clearFilter('${k}')">✕</button></div>`);
  });
  row.innerHTML = chips.join('');
}
function labelFor(k){
  return {owner:'Owner',stage:'Stage',status:'Status',priority:'Priority',search:'Search',wonAwaitingDelivery:'Awaiting delivery'}[k] || k;
}
function clearFilter(key){
  const map = { owner:'filterOwner', stage:'filterStage', status:'filterStatus', priority:'filterPriority', search:'searchInput' };
  if (key === 'wonAwaitingDelivery') { document.getElementById('filterAwaitingDelivery').checked = false; }
  else if (map[key]) { document.getElementById(map[key]).value = ''; }
  refreshProjects();
}

/* ============================================================
   VIEW SWITCH + RENDER
   ============================================================ */
function setView(view){
  currentView = view;
  document.getElementById('btnBoardView').classList.toggle('active', view==='board');
  document.getElementById('btnListView').classList.toggle('active', view==='list');
  document.getElementById('boardView').style.display = view==='board' ? 'flex' : 'none';
  document.getElementById('listView').style.display = view==='list' ? 'block' : 'none';
  render();
}

function render(){
  // Both views are always rendered (cheap) so that mobile, which forces the
  // list view via CSS regardless of currentView, is never left empty.
  renderBoard();
  renderList();
}

function renderBoard(){
  const el = document.getElementById('boardView');
  el.innerHTML = STAGES.map(stage=>{
    const cards = allProjects.filter(p=>p.stage===stage);
    const totalValue = cards.reduce((s,p)=>s+Number(p.dealValue||0),0);
    const weighted = cards.reduce((s,p)=>s+Number(p.weightedValue||0),0);
    return `
    <div class="stage-col" data-stage="${stage}">
      <div class="stage-head">
        <div class="stage-name">${stage}</div>
        <div class="stage-meta"><span>${cards.length} deals · ${money(totalValue)}</span><span>${money(weighted)} wtd.</span></div>
      </div>
      <div class="stage-body" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'${stage}')">
        ${cards.length ? cards.map(cardHtml).join('') : '<div class="empty-col">No deals in this stage</div>'}
      </div>
    </div>`;
  }).join('');
}

function cardHtml(p){
  const flags = flagsFor(p);
  return `
  <div class="card priority-${p.priority||'Medium'}" draggable="true" title="${esc(p.projectName)} — ${esc(p.clientName)}"
       ondragstart="onDragStart(event,'${p.id}')" onclick="openProjectModal('${p.id}')">
    <div class="card-id">${esc(p.id)}</div>
    <div class="card-title">${esc(p.projectName)}</div>
    <div class="card-client">${esc(p.clientName)}</div>
    <div class="card-row">
      <span class="card-value">${money(p.dealValue)}</span>
      <span class="card-owner">${esc(ownerDisplay(p.owner))}</span>
    </div>
    ${flags.length ? `<div class="card-flags">${flags.join('')}</div>` : ''}
  </div>`;
}

function flagsFor(p){
  const flags = [];
  const now = new Date();
  if (p.nextActionDate) {
    const d = new Date(p.nextActionDate);
    const days = (d - now) / 86400000;
    if (p.status === 'Open' && days < 0) flags.push('<span class="flag flag-overdue">Overdue</span>');
    else if (p.status === 'Open' && days <= 3) flags.push('<span class="flag flag-soon">Due soon</span>');
  }
  if (p.updatedAt && p.status === 'Open') {
    const days = (now - new Date(p.updatedAt)) / 86400000;
    if (days >= 14) flags.push('<span class="flag flag-stale">Stale</span>');
  }
  return flags;
}

function renderList(){
  const el = document.getElementById('listView');
  const cols = [
    ['id','Project ID'], ['projectName','Project'], ['clientName','Client'], ['owner','Owner'], ['stage','Stage'],
    ['dealValue','Value'], ['weightedValue','Weighted'], ['priority','Priority'],
    ['expectedCloseDate','Close date'], ['nextActionDate','Next action'], ['status','Status'], ['updatedAt','Updated']
  ];
  const head = cols.map(([key,label])=>`<th class="${sortState.by===key?'sorted':''}" onclick="sortBy('${key}')">${label}</th>`).join('');
  const rows = allProjects.map(p=>{
    const flags = flagsFor(p);
    return `<tr class="priority-${p.priority||'Medium'}" onclick="openProjectModal('${p.id}')">
      <td data-label="Project ID" class="mono">${esc(p.id)}</td>
      <td data-label="Project">${esc(p.projectName)} ${flags.join(' ')}</td>
      <td data-label="Client">${esc(p.clientName)}</td>
      <td data-label="Owner">${esc(ownerDisplay(p.owner))}</td>
      <td data-label="Stage"><span class="stage-pill">${p.stage}</span></td>
      <td data-label="Value" class="mono">${money(p.dealValue)}</td>
      <td data-label="Weighted" class="mono">${money(p.weightedValue)}</td>
      <td data-label="Priority">${p.priority||''}</td>
      <td data-label="Close date" class="mono">${fmtDate(p.expectedCloseDate)}</td>
      <td data-label="Next action" class="mono">${fmtDate(p.nextActionDate)}</td>
      <td data-label="Status"><span class="status-pill status-${p.status}">${p.status}</span></td>
      <td data-label="Updated" class="mono">${fmtDate(p.updatedAt)}</td>
    </tr>`;
  }).join('');
  el.innerHTML = `<table class="pipeline-table"><thead><tr>${head}</tr></thead><tbody>${rows || '<tr><td colspan="12" style="text-align:center; padding:30px; color:var(--ink-soft);">No projects match these filters</td></tr>'}</tbody></table>`;
}

function sortBy(key){
  if (sortState.by === key) sortState.dir = sortState.dir === 'asc' ? 'desc' : 'asc';
  else { sortState.by = key; sortState.dir = 'asc'; }
  refreshProjects();
}

/* ============================================================
   DRAG AND DROP (board stage change)
   ============================================================ */
let draggingId = null;
function onDragStart(e, id){ draggingId = id; e.dataTransfer.effectAllowed = 'move'; }
function onDragOver(e){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
async function onDrop(e, newStage){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!draggingId) return;
  const project = allProjects.find(p=>p.id===draggingId);
  if (!project || project.stage === newStage) return;
  const defaultProb = STAGE_DEFAULT_PROBABILITY[newStage];
  const confirmMsg = `Move "${project.projectName}" to ${newStage}? Probability will default to ${defaultProb}% (editable after).`;
  if (!confirm(confirmMsg)) return;
  try {
    const updates = { stage: newStage, probability: defaultProb };
    if (newStage === 'Lost' && !project.lostReason) {
      const reason = prompt('Reason for loss:') || 'Not specified';
      updates.lostReason = reason;
    }
    // Status is resolved server-side from the new stage (Open/Lost are locked;
    // Won defaults to "Pipeline") — no need to set it here.
    const data = await api('updateProject', { id: draggingId, updates });
    if (!data.success) { toast(data.message, true); return; }
    toast('Stage updated');
    await refreshDashboard(); await refreshProjects();
  } catch(e){ toast(e.message, true); }
  draggingId = null;
}

/* ============================================================
   MODAL — create / edit project
   ============================================================ */
async function openProjectModal(id){
  currentProjectId = id;
  document.getElementById('modalTitle').textContent = id ? 'Edit project' : 'New project';
  document.getElementById('archiveBtn').style.display = id ? 'inline-flex' : 'none';
  document.getElementById('activityTabBtn').style.display = id ? 'inline-flex' : 'none';
  switchTab('details');
  clearForm();

  const isPrivileged = ADMIN_ROLES.indexOf(CURRENT_ROLE) !== -1;
  await populateOwnerDropdown(isPrivileged);

  let existingProject = null;
  if (id) {
    existingProject = allProjects.find(x=>x.id===id);
    if (existingProject) fillForm(existingProject);
    loadActivity(id);
    document.getElementById('projectIdField').style.display = 'block';
    document.getElementById('f_projectId').value = id;
  } else {
    document.getElementById('projectIdField').style.display = 'block';
    document.getElementById('f_projectId').value = '(auto-generated on save)';
    document.getElementById('f_probability').value = STAGE_DEFAULT_PROBABILITY['Lead / Identified'];
    updateWeightedPreview();
  }

  // Non-privileged roles (e.g. BD Executive) can only own their own records —
  // the backend enforces this too, this just makes it visible in the UI.
  const ownerField = document.getElementById('f_owner');
  if (!isPrivileged) {
    ownerField.value = CURRENT_USERNAME;
    ownerField.disabled = true;
  } else {
    ownerField.value = existingProject ? existingProject.owner : CURRENT_USERNAME;
    ownerField.disabled = false;
  }

  onStageChange(existingProject ? existingProject.status : null);
  document.getElementById('modalBackdrop').style.display = 'flex';
}

// Builds the Owner dropdown, showing full names only (username stays the
// underlying value). Admins/BD Head get every user (fetched via listUsers);
// everyone else just gets themselves, disabled.
async function populateOwnerDropdown(isPrivileged){
  const ownerField = document.getElementById('f_owner');
  if (!isPrivileged) {
    ownerField.innerHTML = `<option value="${esc(CURRENT_USERNAME)}">${esc(CURRENT_USER)}</option>`;
    return;
  }
  try {
    const data = await api('listUsers', {});
    if (data.success) {
      data.users.forEach(u => { userDirectory[u.username] = u.fullname; });
      ownerField.innerHTML = data.users.map(u =>
        `<option value="${esc(u.username)}">${esc(u.fullname)}</option>`
      ).join('');
    } else {
      ownerField.innerHTML = `<option value="${esc(CURRENT_USERNAME)}">${esc(CURRENT_USER)}</option>`;
    }
  } catch(e){
    ownerField.innerHTML = `<option value="${esc(CURRENT_USERNAME)}">${esc(CURRENT_USER)}</option>`;
  }
}

function closeModal(){ document.getElementById('modalBackdrop').style.display = 'none'; }

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
}

function clearForm(){
  ['projectName','clientName','contactPerson','contactEmail','contactPhone','engagementType',
   'expectedCloseDate','nextAction','nextActionDate','tags','notes','lostReason','deliveryDate'].forEach(f=>{
    document.getElementById('f_'+f).value = '';
  });
  document.getElementById('f_projectId').value = '';
  document.getElementById('projectIdField').style.display = 'none';
  document.getElementById('f_stage').value = 'Lead / Identified';
  document.getElementById('f_priority').value = 'Medium';
  document.getElementById('f_source').value = '';
  document.getElementById('f_dealValue').value = '';
  document.getElementById('f_probability').value = '';
  document.getElementById('f_caseStudyCandidate').checked = false;
}

function fillForm(p){
  document.getElementById('f_projectName').value = p.projectName || '';
  document.getElementById('f_clientName').value = p.clientName || '';
  document.getElementById('f_contactPerson').value = p.contactPerson || '';
  document.getElementById('f_contactEmail').value = p.contactEmail || '';
  document.getElementById('f_contactPhone').value = p.contactPhone || '';
  document.getElementById('f_stage').value = p.stage || 'Lead / Identified';
  document.getElementById('f_dealValue').value = p.dealValue || '';
  document.getElementById('f_probability').value = p.probability != null ? p.probability : '';
  document.getElementById('f_source').value = p.source || '';
  document.getElementById('f_engagementType').value = p.engagementType || '';
  document.getElementById('f_priority').value = p.priority || 'Medium';
  document.getElementById('f_expectedCloseDate').value = toDateInput(p.expectedCloseDate);
  document.getElementById('f_nextAction').value = p.nextAction || '';
  document.getElementById('f_nextActionDate').value = toDateInput(p.nextActionDate);
  document.getElementById('f_tags').value = (p.tags||[]).join(', ');
  document.getElementById('f_notes').value = p.notes || '';
  document.getElementById('f_lostReason').value = p.lostReason || '';
  document.getElementById('f_deliveryDate').value = toDateInput(p.deliveryDate);
  document.getElementById('f_caseStudyCandidate').checked = !!p.caseStudyCandidate;
  updateWeightedPreview();
}

// Stage -> allowed status option(s). "Won" is the only stage with a real
// choice (post-win delivery lifecycle); everything else is a single locked value.
const STAGE_STATUS_OPTIONS = {
  "Lead / Identified": ["Open"],
  "Qualifying": ["Open"],
  "Proposal Sent": ["Open"],
  "Negotiation": ["Open"],
  "Won": ["Pipeline", "InProgress", "Delivered"],
  "Lost": ["Lost"]
};

// "Next action" is locked to whatever should happen next given the stage.
const NEXT_ACTION_BY_STAGE = {
  "Lead / Identified": "Qualifying",
  "Qualifying": "Proposal Sent",
  "Proposal Sent": "Negotiation",
  "Negotiation": "Close deal (Won / Lost)",
  "Won": "Deliver engagement",
  "Lost": "Archive — no further action"
};

function onStageChange(preferredStatus){
  const stage = document.getElementById('f_stage').value;
  const statusSelect = document.getElementById('f_status');

  // Probability and Next action are both fully locked to the stage — not editable.
  document.getElementById('f_probability').value = STAGE_DEFAULT_PROBABILITY[stage];
  document.getElementById('f_nextAction').value = NEXT_ACTION_BY_STAGE[stage] || '';
  updateWeightedPreview();

  const options = STAGE_STATUS_OPTIONS[stage] || ["Open"];
  const priorValue = (preferredStatus !== undefined && preferredStatus !== null) ? preferredStatus : statusSelect.value;
  const defaultValue = options.indexOf(priorValue) !== -1 ? priorValue : options[0];

  statusSelect.innerHTML = options.map(o => `<option>${o}</option>`).join('');
  statusSelect.value = defaultValue;
  statusSelect.disabled = options.length === 1; // locked unless Won gives a real choice

  onStatusChange();
}
function onStatusChange(){
  const status = document.getElementById('f_status').value;
  document.getElementById('lostReasonField').style.display = status === 'Lost' ? 'block' : 'none';
  document.getElementById('deliveredFields').style.display = status === 'Delivered' ? 'grid' : 'none';
}
function updateWeightedPreview(){
  const val = Number(document.getElementById('f_dealValue').value || 0);
  const prob = Number(document.getElementById('f_probability').value || 0);
  document.getElementById('weightedPreview').textContent = 'Weighted value: ' + money(val * prob / 100);
}

async function saveCurrentProject(){
  const project = {
    projectName: val('f_projectName'), clientName: val('f_clientName'), contactPerson: val('f_contactPerson'),
    contactEmail: val('f_contactEmail'), contactPhone: val('f_contactPhone'), owner: val('f_owner'),
    stage: val('f_stage'), status: val('f_status'), dealValue: Number(val('f_dealValue')||0),
    probability: Number(val('f_probability')||0), source: val('f_source'), engagementType: val('f_engagementType'),
    priority: val('f_priority'), expectedCloseDate: val('f_expectedCloseDate'), nextAction: val('f_nextAction'),
    nextActionDate: val('f_nextActionDate'), tags: val('f_tags').split(',').map(t=>t.trim()).filter(Boolean),
    notes: val('f_notes'), lostReason: val('f_lostReason'), deliveryDate: val('f_deliveryDate'),
    caseStudyCandidate: document.getElementById('f_caseStudyCandidate').checked
  };
  if (!project.projectName || !project.clientName || !project.owner || !project.stage || !project.dealValue || !project.expectedCloseDate) {
    toast('Please fill all required fields (marked *)', true); return;
  }
  if (project.status === 'Lost' && !project.lostReason) { toast('Lost reason is required', true); return; }
  try {
    let data;
    if (currentProjectId) data = await api('updateProject', { id: currentProjectId, updates: project });
    else data = await api('createProject', { project });
    if (!data.success) { toast(data.message, true); return; }
    toast(currentProjectId ? 'Project updated' : 'Project created');
    closeModal();
    await refreshDashboard(); await refreshProjects();
  } catch(e){ toast(e.message, true); }
}

async function archiveCurrentProject(){
  if (!currentProjectId) return;
  if (!confirm('Archive this project? It can be restored later.')) return;
  try {
    const data = await api('archiveProject', { id: currentProjectId });
    if (!data.success) { toast(data.message, true); return; }
    toast('Project archived');
    closeModal();
    await refreshDashboard(); await refreshProjects();
  } catch(e){ toast(e.message, true); }
}

/* ============================================================
   ADMIN — user management (Admin / BD Head roles only)
   ============================================================ */
let allUsers = [];
let editingUsername = null;

function openAdminModal(){
  document.getElementById('adminModalBackdrop').style.display = 'flex';
  cancelEditUser();
  loadUserList();
}
function closeAdminModal(){
  document.getElementById('adminModalBackdrop').style.display = 'none';
}
function clearNewUserForm(){
  document.getElementById('au_username').value = '';
  document.getElementById('au_username').disabled = false;
  document.getElementById('au_fullname').value = '';
  document.getElementById('au_password').value = '';
  document.getElementById('au_role').value = 'BD Executive';
  document.getElementById('au_status').value = 'Active';
}
async function loadUserList(){
  const body = document.getElementById('userListBody');
  body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:16px; color:var(--ink-soft);">Loading…</td></tr>';
  try {
    const data = await api('listUsers', {});
    if (!data.success) { body.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:16px; color:var(--red);">${esc(data.message)}</td></tr>`; return; }
    allUsers = data.users;
    body.innerHTML = allUsers.map(u => `
      <tr>
        <td data-label="Username">${esc(u.username)}</td>
        <td data-label="Full name">${esc(u.fullname)}</td>
        <td data-label="Role">${esc(u.role)}</td>
        <td data-label="Status"><span class="status-pill status-${u.status === 'Active' ? 'Open' : 'Lost'}">${esc(u.status)}</span></td>
        <td data-label="Actions">
          <button class="btn btn-ghost" style="padding:4px 10px; font-size:12px;" onclick="startEditUser('${esc(u.username)}')">Edit</button>
          <button class="btn btn-danger" style="padding:4px 10px; font-size:12px;" onclick="confirmDeleteUser('${esc(u.username)}')">Delete</button>
        </td>
      </tr>`).join('') || '<tr><td colspan="5" style="text-align:center; padding:16px; color:var(--ink-soft);">No users yet</td></tr>';
  } catch(e){ body.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:16px; color:var(--red);">${esc(e.message)}</td></tr>`; }
}
function startEditUser(username){
  const u = allUsers.find(x => x.username === username);
  if (!u) return;
  editingUsername = username;
  document.getElementById('au_username').value = u.username;
  document.getElementById('au_username').disabled = true; // username is the key, not editable
  document.getElementById('au_fullname').value = u.fullname;
  document.getElementById('au_password').value = '';
  document.getElementById('au_role').value = u.role;
  document.getElementById('au_status').value = u.status;
  document.getElementById('adminFormTitle').textContent = 'Edit user — ' + u.username;
  document.getElementById('au_password_label').textContent = 'New password (leave blank to keep current)';
  document.getElementById('au_submit_btn').textContent = 'Save changes';
  document.getElementById('au_cancel_btn').style.display = 'inline-flex';
}
function cancelEditUser(){
  editingUsername = null;
  clearNewUserForm();
  document.getElementById('adminFormTitle').textContent = 'Create new user';
  document.getElementById('au_password_label').textContent = 'Temporary password *';
  document.getElementById('au_submit_btn').textContent = 'Create user';
  document.getElementById('au_cancel_btn').style.display = 'none';
}
async function submitNewUser(){
  const fullname = document.getElementById('au_fullname').value.trim();
  const password = document.getElementById('au_password').value;
  const role = document.getElementById('au_role').value;
  const status = document.getElementById('au_status').value;

  if (editingUsername) {
    if (!fullname) { toast('Full name is required', true); return; }
    try {
      const updates = { fullname, role, status };
      if (password) updates.password = password;
      const data = await api('updateUser', { username: editingUsername, updates });
      if (!data.success) { toast(data.message, true); return; }
      toast('User updated');
      cancelEditUser();
      loadUserList();
    } catch(e){ toast(e.message, true); }
    return;
  }

  const newUser = {
    username: document.getElementById('au_username').value.trim(),
    fullname, password, role, status
  };
  if (!newUser.username || !newUser.fullname || !newUser.password) {
    toast('Username, full name and password are required', true); return;
  }
  try {
    const data = await api('createUser', { newUser });
    if (!data.success) { toast(data.message, true); return; }
    toast('User created');
    clearNewUserForm();
    loadUserList();
  } catch(e){ toast(e.message, true); }
}
async function confirmDeleteUser(username){
  if (!confirm(`Permanently delete user "${username}"? This cannot be undone.`)) return;
  try {
    const data = await api('deleteUser', { username });
    if (!data.success) { toast(data.message, true); return; }
    toast('User deleted');
    if (editingUsername === username) cancelEditUser();
    loadUserList();
  } catch(e){ toast(e.message, true); }
}

/* ============================================================
   ACTIVITY LOG
   ============================================================ */
async function loadActivity(id){
  const el = document.getElementById('activityList');
  el.innerHTML = '<div style="color:var(--ink-soft); font-size:13px;">Loading…</div>';
  try {
    const data = await api('getActivityLog', { projectId: id });
    if (!data.success) { el.innerHTML = ''; return; }
    el.innerHTML = data.activity.map(a=>`
      <div class="activity-entry">
        <div class="activity-date">${fmtDateTime(a.date)} · ${esc(a.author||'')}</div>
        <div class="activity-note">${esc(a.note)}</div>
      </div>`).join('') || '<div style="color:var(--ink-soft); font-size:13px;">No activity yet.</div>';
  } catch(e){ el.innerHTML = ''; }
}

async function submitActivityNote(){
  if (!currentProjectId) { toast('Save the project first', true); return; }
  const noteEl = document.getElementById('newActivityNote');
  const note = noteEl.value.trim();
  if (!note) return;
  try {
    const data = await api('addActivityLogEntry', { projectId: currentProjectId, note });
    if (!data.success) { toast(data.message, true); return; }
    noteEl.value = '';
    loadActivity(currentProjectId);
  } catch(e){ toast(e.message, true); }
}

/* ============================================================
   FORMAT HELPERS
   ============================================================ */
function val(id){ return document.getElementById(id).value.trim(); }
function money(n){
  n = Number(n||0);
  return '$' + n.toLocaleString('en-US', { maximumFractionDigits: 0 });
}
function fmtDate(d){
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return '—';
  return dt.toLocaleDateString('en-US', { year:'2-digit', month:'short', day:'numeric' });
}
function fmtDateTime(d){
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return '—';
  return dt.toLocaleDateString('en-US', { month:'short', day:'numeric' }) + ' ' + dt.toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit' });
}
function toDateInput(d){
  if (!d) return '';
  const dt = new Date(d);
  if (isNaN(dt)) return '';
  return dt.toISOString().slice(0,10);
}
function esc(s){
  return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
let toastTimer;
function toast(msg, isError){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? 'var(--red)' : 'var(--ink)';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 3200);
}

/* ============================================================
   INIT
   ============================================================ */
if (TOKEN && CURRENT_USER) { showApp(); } else { showLogin(); }
